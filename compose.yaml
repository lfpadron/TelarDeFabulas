name: telar-fabulas

services:
  web:
    build:
      context: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    env_file:
      - .env
    volumes:
      - .:/code
      - media_data:/code/media
      - static_data:/code/staticfiles
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
    command: celery -A config worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    env_file:
      - .env
    volumes:
      - .:/code
      - media_data:/code/media
    depends_on:
      - postgres
      - redis

  beat:
    build:
      context: .
    command: celery -A config beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file:
      - .env
    volumes:
      - .:/code
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-telar_fabulas}
      POSTGRES_USER: ${POSTGRES_USER:-telar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telar_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
